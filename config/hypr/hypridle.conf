general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = pidof hyprlock || hyprlock   # гарантируем блокировку перед любым сном (в т.ч. по крышке ноутбука)
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false                      # уважать idle-inhibit (видео в браузере, mpv full-screen и т.д.)
    ignore_systemd_inhibit = false
}

# 5 минут простоя — выключить экран (энергосбережение), но не пока играет медиа
listener {
    timeout = 300
    on-timeout = ~/.config/hypr/scripts/dpms-off-if-idle.sh
    on-resume = hyprctl dispatch dpms on
}

# 15 минут простоя — заблокировать экран, но только если сейчас не играет медиа
listener {
    timeout = 900
    on-timeout = ~/.config/hypr/scripts/lock-if-idle.sh
}

# 30 минут простоя — уйти в сон
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}

