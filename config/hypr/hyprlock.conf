background {
    monitor =
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
    blur_size = 4
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.2
    outer_color = rgba(151515aa)
    inner_color = rgba(200, 200, 200, 0.8)
    font_color = rgb(10, 10, 10)
    font_family = JetBrains Mono
    fade_on_empty = true
    placeholder_text = <i>Введите пароль...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 90
    font_family = JetBrains Mono
    position = 0, 300
    halign = center
    valign = center
}
